<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>convertor de Moedas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./stlyle.css">
</head>
<body>
    <img class="logo-Gif" src="./assents/logo.gif" alt="convertor de moedas">
    <main>
        <label>Converter <b>De</b>
            <select>
                <option>R$ Real Brasileiro</option>
            </select>
        </label>
        <label>Converter <b>Para</b>
            <select>
                <option>US$ Dólar Americano</option>
                <option>€ Euro</option>
                <option>£ libra</option>
                <option>₿ Bitcoin</option>
            </select>
        </label>
        <p class="valor">Valor</p>
            <input placeholder="R$ 10.000,00">
    </label>
    <button>Converter</button>
    <Section>
        <div class="moeda-conversão">
            <img src="./assents/brasil 2.jpg" alt="logo-moeda-a-converter">
            <p class="moeda-nome">Real</p>
            <p class="moeda-logo">R$ 0,00</p>
        </div>
        <img class="seta-conversão" src="./assents/Vector.jpg" alt="logo-seta-conversão">
          <div class="moeda-conversão">
            <img src="./assents/estados-unidos (1) 1.jpg" alt="logo-moeda-convertida">
            <p class="moeda-nome">Dólar Americano</p>
            <p class="moeda-logo">US$ 0,00</p>
        </div>
    </Section>
    </main>
</body>
</html>
